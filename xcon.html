<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الأسماء</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f4f8; }
        h1 { color: #0d47a1; text-align: center; border-bottom: 2px solid #1976d2; padding-bottom: 10px; }
        .entry-card { 
            background: white; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            border-right: 5px solid #1976d2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .time { font-size: 0.8rem; color: #78909c; }
    </style>
</head>
<body>

    <h1>قائمة الأسماء المستلمة</h1>
    <div id="dataList"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaBH-226p85q6sXgvdIGynkh0-0Ktsqf4",
    authDomain: "mysignageproject.firebaseapp.com",
    projectId: "mysignageproject",
    storageBucket: "mysignageproject.firebasestorage.app",
    messagingSenderId: "879223421643",
    appId: "1:879223421643:web:ebb1ff5b8adc487f89794e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const list = document.getElementById('dataList');

  // الاستماع للبيانات وعرضها فور وصولها
  onValue(ref(db, 'entries'), (snapshot) => {
    list.innerHTML = ""; 
    const data = snapshot.val();
    if (data) {
        Object.values(data).reverse().forEach(entry => {
            const div = document.createElement('div');
            div.className = 'entry-card';
            div.innerHTML = `
                <strong>${entry.name}</strong>
                <span class="time">${entry.date}</span>
            `;
            list.appendChild(div);
        });
    } else {
        list.innerHTML = "<p style='text-align:center;'>لا توجد أسماء مسجلة حالياً.</p>";
    }
  });
</script>
</body>
</html>
