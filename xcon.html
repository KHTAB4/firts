<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الأسماء</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f4f8; }
        h1 { color: #0d47a1; text-align: center; border-bottom: 2px solid #1976d2; padding-bottom: 10px; }
        .entry-card { 
            background: white; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            border-right: 5px solid #1976d2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .time { font-size: 0.8rem; color: #78909c; }
    </style>
</head>
<body>

    <h1>قائمة الأسماء المستلمة</h1>
    <div id="dataList"></div>

    <script>
        const list = document.getElementById('dataList');
        const entries = JSON.parse(localStorage.getItem('adminData')) || [];

        if (entries.length === 0) {
            list.innerHTML = "<p style='text-align:center;'>لا توجد أسماء مسجلة.</p>";
        } else {
            entries.reverse().forEach(entry => {
                const div = document.createElement('div');
                div.className = 'entry-card';
                div.innerHTML = `
                    <strong>${entry.name}</strong>
                    <span class="time">${entry.date}</span>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
