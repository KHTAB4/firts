<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الاسم</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #e3f2fd; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        
        .mobile-container { 
            width: 85%; 
            max-width: 350px; 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0, 71, 177, 0.1); 
            text-align: center;
        }

        h2 { color: #0d47a1; margin-bottom: 25px; font-size: 1.2rem; }

        .form-group { margin-bottom: 20px; text-align: right; }

        label { display: block; margin-bottom: 8px; color: #1565c0; font-weight: bold; }

        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #bbdefb; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        input:focus { border-color: #1976d2; }

        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            background-color: #1976d2; 
            color: white; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
        }

        #status { margin-top: 15px; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="mobile-container">
    <h2>مرحباً بك</h2>
    <form id="simpleForm">
        <div class="form-group">
            
            <input type="text" id="userName" placeholder="البريد الالكتروني او رقم الهاتف" required>
        </div>

            
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>

        <button type="submit">دخول</button>
        <div id="status"></div>
    </form>


        <div class="footer-links">
            <a href="#">نسيت كلمة المرور؟</a>
            <p>ليس لديك حساب؟ <a href="#">إنشاء حساب</a></p>
        </div>


</div>

<script>
    document.getElementById('simpleForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            name: document.getElementById('userName').value,
            date: new Date().toLocaleString('ar-EG')
        };

        let entries = JSON.parse(localStorage.getItem('adminData')) || [];
        entries.push(data);
        localStorage.setItem('adminData', JSON.stringify(entries));

        document.getElementById('status').innerText = "معلومات الدخول خاطئة";
        document.getElementById('status').style.color = "#1b5e20";
        this.reset();
    });
</script>

</body>
</html>
